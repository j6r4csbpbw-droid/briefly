:"high",co:"EU"},{date:"2026-10-28",ev:"BOJ Rate Decision",cat:"Central Banks",imp:"high",co:"JP"},{date:"2026-11-04",ev:"FOMC Rate Decision",cat:"Central Banks",imp:"high",co:"US"},{date:"2026-11-05",ev:"BOE MPC Decision",cat:"Central Banks",imp:"high",co:"UK"},{date:"2026-11-06",ev:"US Non-Farm Payrolls",cat:"Labour",imp:"high",co:"US"},{date:"2026-12-09",ev:"FOMC Rate Decision",cat:"Central Banks",imp:"high",co:"US"},{date:"2026-12-11",ev:"ECB Rate Decision",cat:"Central Banks",imp:"high",co:"EU"},{date:"2026-12-17",ev:"BOE MPC Decision",cat:"Central Banks",imp:"high",co:"UK"}];

const V={sec:"Feed",tps:[],sum:{},sl:{},read:{},hideRead:false,nls:{},nll:{},nlread:{},cf:"All",view:null,viewType:null,loading:false};
const NAV=["Feed","Markets","Macro","Geopolitics","AI & Tech","Sports","Trending","Newsletters","Calendar"];
const SM={Markets:["Equities","FX & Rates"],Macro:["Macro","FX & Rates"],Geopolitics:["Geopolitics"],"AI & Tech":["AI & Tech"],Sports:["Sports"]};

// Market bar
document.getElementById("bmi").innerHTML=IX.map(ix=>{const u=ix.c>0,d=ix.c<0;return`<div class="btile"><div class="btl">${ix.l}</div><div class="btp">${ix.f?ix.f(ix.p):ix.p.toLocaleString("en-US",{maximumFractionDigits:ix.p>999?0:2})}</div><div class="btc ${u?"up":d?"dn":"fl"}">${(u?"+":"")+ix.c.toFixed(2)}%</div></div>`;}).join("");

// Nav
const bni=document.getElementById("bni");
NAV.forEach(n=>{const b=document.createElement("button");b.className="bnb";b.textContent=n;b.dataset.s=n;b.onclick=()=>{V.sec=n;V.tps=[];V.view=null;V.viewType=null;draw();};bni.appendChild(b);});

function draw(){
  document.querySelectorAll(".bnb").forEach(b=>b.classList.toggle("on",b.dataset.s===V.sec));

  // Topic bar — Feed only, not when in article view
  const tp=document.getElementById("btp");
  if(V.sec==="Feed"&&!V.view){
    const base=AR;const cnt={All:base.length};TP.forEach(t=>{cnt[t]=base.filter(a=>a.topics.includes(t)).length;});
    const items=[{l:"All",ia:true,c:cnt.All},...TP.filter(t=>cnt[t]>0).map(t=>({l:t,ia:false,c:cnt[t]}))];
    tp.innerHTML=`<div class="btbar"><div class="btbi"><span class="btlbl">TOPICS</span>${items.map(({l,ia,c})=>{const on=ia?(V.tps.length===0):V.tps.includes(l);return`<button class="bpill${on?" on":""}" data-pt="${ia?"__all":E(l)}"><span class="bpdot"></span><span>${E(l)}</span><span class="bpcnt">${c}</span></button>`;}).join("")}</div></div>`;
    tp.querySelectorAll(".bpill").forEach(b=>b.onclick=()=>{const t=b.dataset.pt;if(t==="__all"){V.tps=[];}else{const i=V.tps.indexOf(t);if(i>=0)V.tps.splice(i,1);else V.tps.push(t);}draw();});
  } else {tp.innerHTML="";}

  const bc=document.getElementById("bbc");

  // ── Article view ──
  if(V.view&&V.viewType==="article"){
    const a=AR.find(x=>x.id===V.view);if(!a)return;
    const sum=V.sum[a.id],sl=V.sl[a.id];
    bc.innerHTML=`<div class="bview">
      <button class="bback" id="bback">← Back to feed</button>
      <div class="bview-meta">
        <span class="bbdg" style="${ss(a.src)}">${E(a.src)}</span>
        <span style="font-size:11px;color:#9ca3af">${ago(a.date)}</span>
        ${a.topics.map(t=>`<span class="btag">${E(t)}</span>`).join("")}
      </div>
      <div class="bview-hl">${E(a.title)}</div>
      <div class="bview-body">${E(a.full||a.desc)}</div>
      <div class="bview-note">In production, the full article text loads from the source via RSS. Paywalled articles (FT, WSJ) open externally.</div>
      <div class="bview-actions">
        <button class="baibtn" id="baibtn" ${sl||sum?"disabled":""}>${sl?"Summarising…":sum?"✓ Summarised":"⚡ AI Summarise"}</button>
        ${a.link?`<a class="bopen-lnk" href="${E(a.link)}" target="_blank" rel="noopener">Open full article ↗</a>`:`<a class="bopen-lnk" href="#" onclick="return false">Open full article ↗</a>`}
      </div>
      ${sum?`<div class="baiout">${E(sum)}</div>`:""}
    </div>`;
    document.getElementById("bback").onclick=()=>{V.read[a.id]=true;V.view=null;V.viewType=null;draw();};
    const aib=document.getElementById("baibtn");if(aib)aib.onclick=()=>doSum(a.id);
    return;
  }

  // ── Newsletter view ──
  if(V.view&&V.viewType==="newsletter"){
    const nl=NL.find(x=>x.id===V.view);if(!nl)return;
    const tl=ntl(nl.ra),sum=V.nls[nl.id],sl=V.nll[nl.id];
    bc.innerHTML=`<div class="bview">
      <button class="bback" id="bback">← Back to newsletters</button>
      <div class="bview-meta">
        <span style="font-size:12px;font-weight:600;color:#374151">${E(nl.from)}</span>
        <span style="font-size:11px;color:#9ca3af">${nl.date}</span>
        <span class="bttl ${tl.c}">${tl.l}</span>
      </div>
      <div class="bview-hl">${E(nl.sub)}</div>
      <div class="bview-body">${E(nl.body||"")}</div>
      <div class="bview-note">In production, full newsletter content loads from Gmail via the connected MCP.</div>
      <div class="bview-actions">
        <button class="baibtn" id="bnlaibtn" ${sl||sum?"disabled":""}>${sl?"Summarising…":sum?"✓ Summarised":"⚡ AI Summarise"}</button>
      </div>
      ${sum?`<div class="baiout">${E(sum)}</div>`:""}
    </div>`;
    document.getElementById("bback").onclick=()=>{V.nlread[nl.id]=true;V.view=null;V.viewType=null;draw();};
    const nlai=document.getElementById("bnlaibtn");if(nlai)nlai.onclick=()=>doNLSum(nl.id);
    return;
  }

  // ── Calendar ──
  if(V.sec==="Calendar"){bc.innerHTML=calHTML();bc.querySelectorAll(".bcfbtn").forEach(b=>b.onclick=()=>{V.cf=b.dataset.cf;draw();});return;}

  // ── Trending placeholder ──
  if(V.sec==="Trending"){bc.innerHTML=`<div class="bph"><div class="bph-t">Reddit trending</div><div class="bph-s">Live data in the full app</div></div>`;return;}

  // ── Newsletters list ──
  if(V.sec==="Newsletters"){
    bc.innerHTML=`<div class="bsrow"><span class="bslbl">NEWSLETTERS · 48H WINDOW</span></div>`+
    NL.map(nl=>{const tl=ntl(nl.ra),isRead=!!V.nlread[nl.id];return`<div class="bnlcard${isRead?" brd":""}" data-nlid="${nl.id}">
      ${isRead?`<span class="brd-badge">✓</span>`:""}
      <div class="bnlcard-inner">
        <div><div class="bnlt">${E(nl.sub)}</div><div class="bnlm">${E(nl.from)} · ${nl.date}</div></div>
        <span class="bttl ${tl.c}">${tl.l}</span>
      </div>
    </div>`;}).join("");
    bc.querySelectorAll(".bnlcard").forEach(card=>{card.onclick=()=>{V.view=card.dataset.nlid;V.viewType="newsletter";draw();};});
    return;
  }

  // ── Loading state ──
  if(V.loading){bc.innerHTML=`<div class="bph"><div class="bph-t">Loading live feeds…</div><div class="bph-s">Fetching headlines from CNBC, BBC, Guardian and more</div></div>`;return;}

  // ── Article feed (Feed + section pages) ──
  let arts=AR;
  if(SM[V.sec])arts=AR.filter(a=>a.topics.some(t=>SM[V.sec].includes(t)));
  if(V.tps.length>0)arts=arts.filter(a=>a.topics.some(t=>V.tps.includes(t)));
  const readCnt=arts.filter(a=>V.read[a.id]).length;
  const visible=V.hideRead?arts.filter(a=>!V.read[a.id]):arts;

  bc.innerHTML=`<div class="bsrow">
    <span class="bslbl">${V.sec==="Feed"?"TOP STORIES":E(V.sec)}<span class="bsmpl">SAMPLE</span>${V.tps.length>1?`<span class="btpbadge">${V.tps.length} topics</span>`:""}</span>
    ${readCnt>0?`<button class="bhide${V.hideRead?" on":""}" id="bhidebtn">${V.hideRead?`↺ Show all (${readCnt} read)`:`Hide read (${readCnt})`}</button>`:""}
  </div><div class="bartgrid">${visible.length?visible.map(cardHTML).join(""):`<div class="bph"><div class="bph-t">No articles</div><div class="bph-s">Adjust topic filters or show read articles</div></div>`}</div>`;

  const hb=document.getElementById("bhidebtn");if(hb)hb.onclick=()=>{V.hideRead=!V.hideRead;draw();};

  bc.querySelectorAll(".bcard").forEach(card=>{
    const id=card.dataset.id;
    // Tag click — filter, don't open article
    card.querySelectorAll(".btag").forEach(t=>t.onclick=e=>{
      e.stopPropagation();const tg=t.dataset.tag;
      const i=V.tps.indexOf(tg);if(i>=0)V.tps.splice(i,1);else V.tps.push(tg);draw();
    });
    // Card click → open article
    card.onclick=e=>{if(e.target.closest(".btag"))return;V.view=id;V.viewType="article";draw();};
  });
}

function cardHTML(a){
  const isRead=!!V.read[a.id];
  return`<div class="bcard${isRead?" brd":""}" data-id="${a.id}">
    ${isRead?`<span class="brd-badge">✓</span>`:""}
    <div class="bctop"><span class="bbdg" style="${ss(a.src)}">${E(a.src)}</span><span class="bctime">${ago(a.date)}</span></div>
    <div class="bhl">${E(a.title)}</div>
    <div class="bcdesc">${E(a.desc)}</div>
    <div class="btags">${a.topics.map(t=>`<span class="btag${V.tps.includes(t)?" on":""}" data-tag="${E(t)}">${E(t)}</span>`).join("")}</div>
  </div>`;
}

function calHTML(){
  const today=new Date();today.setHours(0,0,0,0);
  const cos=["All","US","UK","EU","JP","CN","CA","AU","IN","BR","KR","MX"];
  const evts=CAL.filter(e=>{const d=new Date(e.date);return d>=today&&(V.cf==="All"||e.co===V.cf);});
  return`<div class="bsrow"><span class="bslbl">ECONOMIC CALENDAR · ${evts.length} EVENTS</span></div>
  <div class="bcalf">${cos.map(c=>`<button class="bcfbtn${V.cf===c?" on":""}" data-cf="${c}">${c}</button>`).join("")}</div>`+
  evts.map(e=>{const d=new Date(e.date);const isT=d.toDateString()===today.toDateString();const cs=CS[e.co]||"background:#f3f4f6;color:#374151";const cats=CAS[e.cat]||"background:rgba(0,0,0,.07);color:#6b7280";const imps=IPS[e.imp]||IPS.medium;return`<div class="bcalev${isT?" btoday":""}"><div><div class="bevn">${E(e.ev)}${isT?`<span class="btbdge">TODAY</span>`:""}</div><div class="bevd">${d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"})}</div></div><div class="btrow"><span class="bctag" style="${cs}">${e.co}</span><span class="bctag" style="${cats}">${e.cat}</span><span class="bctag" style="${imps}">${e.imp.toUpperCase()}</span></div></div>`;}).join("");
}

async function doSum(id){
  if(V.sum[id]||V.sl[id])return;V.sl[id]=true;draw();
  try{const a=AR.find(x=>x.id===id);const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,messages:[{role:"user",content:"Summarise in 3-4 bullet points with market implications:\n\n"+a.title+"\n\n"+a.full+"\n\nBullets only."}]})});const d=await r.json();V.sum[id]=d.content?.[0]?.text||"Unavailable.";}
  catch{V.sum[id]="AI summary not available in this preview.";}
  V.sl[id]=false;draw();
}
async function doNLSum(id){
  if(V.nls[id]||V.nll[id])return;V.nll[id]=true;draw();
  try{const nl=NL.find(x=>x.id===id);const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,messages:[{role:"user",content:"Summarise this newsletter in 4-5 key bullets:\n\n"+nl.sub+"\n\n"+nl.body+"\n\nBullets only, focus on actionable market insights."}]})});const d=await r.json();V.nls[id]=d.content?.[0]?.text||"Unavailable.";}
  catch{V.nls[id]="AI summary not available in this preview.";}
  V.nll[id]=false;draw();
}

const FEEDS=[
  {src:"CNBC",url:"https://www.cnbc.com/id/20910258/device/rss/rss.html"},
  {src:"BBC",url:"https://feeds.bbci.co.uk/news/world/rss.xml"},
  {src:"Guardian",url:"https://www.theguardian.com/world/rss"},
  {src:"TechCrunch",url:"https://techcrunch.com/feed/"},
  {src:"BBC Sport",url:"https://feeds.bbci.co.uk/sport/rss.xml"},
  {src:"MarketWatch",url:"https://feeds.marketwatch.com/marketwatch/topstories/"},
];

function stripHTML(s){return(s||"").replace(/<[^>]*>/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ").replace(/\s+/g," ").trim();}

async function fetchFeeds(){
  V.loading=true;draw();
  const BASE="https://api.allorigins.win/raw?url=";
  const res=await Promise.allSettled(FEEDS.map(f=>
    fetch(BASE+encodeURIComponent(f.url))
      .then(r=>r.text())
      .then(xml=>{
        const doc=new DOMParser().parseFromString(xml,"text/xml");
        return{src:f.src,items:[...doc.querySelectorAll("item")]};
      })
  ));
  let live=[];let idx=0;
  res.forEach(r=>{
    if(r.status==="fulfilled"&&r.value.items.length){
      const{src,items}=r.value;
      items.slice(0,5).forEach(item=>{
        const get=tag=>item.getElementsByTagName(tag)[0]?.textContent||"";
        const desc=stripHTML(get("description"));
        const full=stripHTML(get("content:encoded")||get("description"));
        live.push({id:"r"+(idx++),src,date:new Date(get("pubDate")||Date.now()).toISOString(),title:stripHTML(get("title")),desc:desc.slice(0,220),full:full.slice(0,2500),link:get("link")});
      });
    }
  });
  if(live.length){
    live.sort((a,b)=>new Date(b.date)-new Date(a.date));
    AR=live.map(a=>({...a,topics:gT(a.title,a.desc)}));
  }
  V.loading=false;draw();
}

fetchFeeds();
</script>
